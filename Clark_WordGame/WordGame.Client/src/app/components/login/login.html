<div class="min-h-screen bg-gray-100 flex items-center justify-center">
  <div class="bg-white rounded-lg shadow-md p-10 w-full max-w-md">
    <h1 class="text-3xl font-bold text-center text-gray-900 mb-8">Login</h1>

    <form (ngSubmit)="onSubmit()">
      <input
        type="email"
        placeholder="Email address"
        [(ngModel)]="email"
        name="email"
        required
        class="w-full border border-gray-300 rounded px-4 py-2 mb-3 focus:outline-none focus:ring-2 focus:ring-blue-400"
      />
      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
        name="password"
        required
        class="w-full border border-gray-300 rounded px-4 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400"
      />

      @if (errorMessage) {
        <p class="text-red-500 text-sm mb-3">{{ errorMessage }}</p>
      }

      <button
        type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded transition-colors"
      >
        Login to your account
      </button>
    </form>

    <p class="text-center text-gray-600 mt-4 text-sm">
      Don't have an account?
      <a routerLink="/auth/register" class="text-indigo-600 hover:underline">Sign Up</a>
    </p>
  </div>
</div>
