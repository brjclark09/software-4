<div class="min-h-[60vh] flex flex-col items-center justify-center gap-4">
  <h1 class="text-4xl font-bold underline">WordGame</h1>

  @if (isLoggedIn()) {
    <p class="text-lg">Welcome back, {{ userEmail() }}!</p>
    <a routerLink="/game" class="text-blue-500 hover:underline">Ready to continue playing?</a>
  } @else {
    <p class="text-lg">Welcome to WordGame!</p>
    <p>
      Please <a routerLink="/auth/login" class="text-blue-500 hover:underline">log in</a>
      or <a routerLink="/auth/register" class="text-blue-500 hover:underline">register</a>
      to play.
    </p>
  }
</div>
