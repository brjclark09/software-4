<header>
  <nav class="px-6 py-4 shadow-md bg-slate-900">
    <div class="container mx-auto flex justify-between items-center">
      <div class="flex items-center gap-6">
        <a class="text-white" [routerLink]="['/']">Home</a>
        @if (isLoggedIn()) {
          <a class="text-white" [routerLink]="['/game']">Word Game</a>
        }
      </div>

      <div>
        @if (isLoggedIn()) {
          <a class="text-white hover:cursor-pointer ml-4" (click)="logout()">Logout</a>
        } @else {
          <a class="text-white hover:cursor-pointer ml-4" [routerLink]="['/auth/register']">Register</a>
          <a class="text-white hover:cursor-pointer ml-4" [routerLink]="['/auth/login']">Login</a>
        }
      </div>
    </div>
  </nav>
</header>
