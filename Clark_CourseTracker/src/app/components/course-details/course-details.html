@if (invalidId) {
  <div class="course-details-container">
    <div class="course-details-header">
      <h2 class="course-details-title">Course Not Found</h2>
    </div>
    <p>No course exists with that ID.</p>
    <button (click)="onCancel()">Back to Courses</button>
  </div>
} @else if (editableCourse) {
  <div class="course-details-container">
    <div class="course-details-header">
      <h1 class="course-details-title">Course Details</h1>
    </div>

    <div class="course-details-content">
      <div class="content-section">
        <div class="form-group">
          <label for="title">Title</label>
          <input id="title" type="text" [(ngModel)]="editableCourse.title" />
        </div>

        <div class="form-group">
          <label for="instructor">Instructor</label>
          <input id="instructor" type="text" [(ngModel)]="editableCourse.instructor" />
        </div>

        <div class="form-group">
          <label for="credits">Credits</label>
          <input id="credits" type="number" [(ngModel)]="editableCourse.credits" />
        </div>

        <div class="form-group">
          <label for="isCompleted">Completed</label>
          <input id="isCompleted" type="checkbox" [(ngModel)]="editableCourse.isCompleted" />
        </div>

        @if (editableCourse.isCompleted) {
          <p>This course is marked as completed.</p>
        }
      </div>
    </div>

    <button (click)="onDone()">Done</button>
    <button (click)="onCancel()">Cancel</button>
  </div>
}
